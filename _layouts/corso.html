<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} — {{ site.title }}</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- CSS variables per il colore di accento del corso -->
<style>
  :root {
    {% if page.materia == "matematica" %}
    --accent:        #0891b2;
    --accent-light:  #e0f2fe;
    --accent-border: #7dd3fc;
    {% elsif page.materia == "cittadinanza" %}
    --accent:        #7c3aed;
    --accent-light:  #faf5ff;
    --accent-border: #d8b4fe;
    {% else %}
    --accent:        #0f766e;
    --accent-light:  #f0fdf4;
    --accent-border: #86efac;
    {% endif %}
  }
</style>

<!-- MathJax -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$','$'], ['\\(','\\)']],
      displayMath: [['$$','$$'], ['\\[','\\]']],
      tags: 'ams'
    },
    options: { skipHtmlTags: ['script','noscript','style','textarea'] }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

{% seo %}
</head>
<body>

{% include topbar.html %}

<div class="page-layout">

  <!-- Sidebar con capitoli -->
  <aside class="sidebar" aria-label="Capitoli del corso">
    <p class="sidebar-course-name">{{ page.title }}</p>
    <p class="sidebar-course-class">{{ page.classe }} · Liceo Vittoria</p>
    <nav>
      <ul class="sidebar-nav">
        {% for cap in page.capitoli_lista %}
        <li>
          <a href="#cap{{ cap.numero }}">
            <span class="chapter-num">Capitolo {{ cap.numero }}</span>
            {{ cap.titolo }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </aside>

  <!-- Contenuto principale -->
  <main class="main-content" id="main">
    {{ content }}
  </main>

</div>

{% include footer.html %}
{% include scripts.html %}

</body>
</html>
